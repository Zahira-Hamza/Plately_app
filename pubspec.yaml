  fl_chart: ^0.67.0
  google_fonts: ^6.2.1
  equatable: ^2.0.5
  dartz: ^0.10.1
  connectivity_plus: ^6.0.3
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true