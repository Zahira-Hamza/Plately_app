publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.4
  get_it: ^7.6.7
  dio: ^5.4.1
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  go_router: ^13.2.0
  cached_network_image: ^3.3.1
